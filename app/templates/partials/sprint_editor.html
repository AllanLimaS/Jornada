<div class="sprint-editor-wrapper">
    <!-- Header Fixo -->
    <div class="sprint-editor-header">
        <div class="flex items-center gap-4">
            <button class="btn btn-ghost btn-sm" 
                    hx-get="/htmx/sprint/list" 
                    hx-target="#sprint-page-content">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div>
                <h2 class="text-xl font-bold">{{ nome }}</h2>
                <p class="text-xs text-muted">{{ data_inicio.strftime('%d/%m/%Y') }} - {{ data_fim.strftime('%d/%m/%Y') }}</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button class="btn btn-ghost" onclick="copyMarkdownFromVditor()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-2"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                Copiar
            </button>
            <form hx-post="/htmx/sprint/save" hx-target="#sprint-page-content" onsubmit="syncVditorToForm()">
                <input type="hidden" name="sprint_id" value="{{ sprint_id or '' }}">
                <input type="hidden" name="nome" value="{{ nome }}">
                <input type="hidden" name="data_inicio" value="{{ data_inicio }}">
                <input type="hidden" name="data_fim" value="{{ data_fim }}">
                <textarea name="conteudo_markdown" id="real-markdown-input" style="display: none;"></textarea>
                <textarea id="initial-markdown-data" style="display: none;">{{ conteudo_markdown }}</textarea>
                <button type="submit" class="btn btn-primary">
                    Salvar Sprint
                </button>
            </form>
        </div>
    </div>

    <!-- Container do Vditor -->
    <div class="sprint-editor-body" id="vditor-container"></div>
</div>

<style>
    .sprint-editor-wrapper {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 120px);
        margin: -1.5rem;
        background: var(--bg-body);
    }
    .sprint-editor-header {
        background: var(--bg-card);
        border-bottom: 1px solid var(--border-color);
        padding: 1rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 20;
    }
    .sprint-editor-body {
        flex: 1;
        overflow: hidden;
    }
    
    /* Integração total do Vditor com o fundo do sistema */
    .vditor {
        border: none !important;
        background-color: transparent !important;
    }
    .vditor-toolbar {
        display: none !important; /* Força sumir a barra de ferramentas */
    }
    .vditor-content, .vditor-ir, .vditor-textarea {
        background-color: transparent !important;
    }
    .vditor-reset {
        background-color: transparent !important;
        color: var(--text-main) !important;
        padding: 2rem 4rem !important;
    }
    .vditor-reset h1, .vditor-reset h2, .vditor-reset h3 {
        border-bottom: none !important;
        margin-bottom: 0.5rem !important;
        padding-bottom: 0 !important;
    }
    .vditor-ir__marker, .vditor-ir__marker--heading, .vditor-ir__node::before {
        display: none !important;
    }
    
    #copy-toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        font-size: 0.85rem;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 1000;
    }
</style>

<div id="copy-toast">Markdown copiado!</div>

<script>
    (function() {
        const getMode = () => document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'classic';
        const initialValue = document.getElementById('initial-markdown-data').value;

        window.vditor = new Vditor('vditor-container', {
            height: '100%',
            mode: 'ir',
            value: initialValue,
            theme: getMode(),
            icon: 'material',
            placeholder: 'Comece a escrever seu relatório...',
            cache: {
                enable: false
            },
            toolbarConfig: {
                hide: true
            },
            preview: {
                theme: {
                    current: getMode() === 'dark' ? 'dark' : 'light'
                }
            },
            toolbar: [], // Remove todos os itens da toolbar
            after: () => {
                console.log('Vditor pronto no modo minimalista');
            }
        });

        // Observar mudanças de tema para atualizar o Vditor
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.attributeName === 'data-theme') {
                    const theme = getMode();
                    window.vditor.setTheme(theme, theme === 'dark' ? 'dark' : 'light');
                }
            });
        });
        observer.observe(document.documentElement, { attributes: true });
    })();

    function syncVditorToForm() {
        const markdown = window.vditor.getValue();
        document.getElementById('real-markdown-input').value = markdown;
    }

    function copyMarkdownFromVditor() {
        const markdown = window.vditor.getValue();
        navigator.clipboard.writeText(markdown).then(() => {
            const toast = document.getElementById('copy-toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        });
    }
</script>
