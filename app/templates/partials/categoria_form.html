<div class="card" id="categoria-form-container">
    <div class="card-header">
        <h3 class="card-title">{% if categoria %}Editar Categoria{% else %}Nova Categoria{% endif %}</h3>
    </div>
    
    <form 
        {% if categoria %}
        hx-patch="/htmx/categorias-chamado/{{ categoria.id }}"
        {% else %}
        hx-post="/htmx/categorias-chamado" 
        {% endif %}
        hx-target="#categorias-list-container" 
        hx-swap="innerHTML" 
        hx-on::after-request="if(event.detail.successful) document.getElementById('global-modal').classList.remove('active')"
        class="js-reset-on-success">
        
        <div class="form-group">
            <label class="form-label">Nome da Categoria</label>
            <input type="text" name="nome" class="form-control" required placeholder="Ex: Infraestrutura, Software..." value="{{ categoria.nome if categoria else '' }}">
        </div>
        <div class="form-group">
            <label class="form-label">Cor</label>
            <input type="color" name="cor" class="form-control" style="height: 45px; padding: 0.25rem;" value="{{ categoria.cor if categoria else '#333333' }}">
        </div>
        
        <div class="mt-6">
            <button type="submit" class="btn btn-primary btn-block">
                {% if categoria %}Salvar Alterações{% else %}Salvar Categoria{% endif %}
            </button>
            {% if categoria %}
            <button type="button" class="btn btn-ghost btn-block mt-2" hx-get="/htmx/categorias-chamado/form-new" hx-target="#categoria-form-container" hx-swap="outerHTML">
                Cancelar
            </button>
            {% endif %}
        </div>
    </form>
</div>
