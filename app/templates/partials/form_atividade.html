<form class="card" hx-post="/api/v1/atividades/" hx-target="#lista-atividades" hx-swap="afterbegin">
    <h3 class="card-title">{% if atividade %}Editar Atividade #{{atividade.id}}{% else %}Nova Atividade{% endif %}</h3>
    <div class="form-group">
        <label class="form-label">Data Referência</label>
        <input type="date" name="data_referencia" class="form-control" value="{{ atividade.data_referencia if atividade else '' }}" required>
    </div>
    <div class="row">
        <div class="form-group">
            <label class="form-label">Início</label>
            <input type="time" name="hora_inicio" class="form-control" value="{{ atividade.hora_inicio.strftime('%H:%M') if atividade else '' }}" required>
        </div>
        <div class="form-group">
            <label class="form-label">Fim</label>
            <input type="time" name="hora_fim" class="form-control" value="{{ atividade.hora_fim.strftime('%H:%M') if atividade else '' }}" required>
        </div>
    </div>
    <div class="form-group">
        <label class="form-label">Descrição</label>
        <input type="text" name="descricao" class="form-control" value="{{ atividade.descricao if atividade else '' }}" required>
    </div>
    <div class="row" style="margin-top: 1rem;">
        <button type="submit" class="btn btn-primary btn-block">Salvar Atividade</button>
        <button type="button" class="btn btn-secondary btn-block" hx-on:click="this.closest('form').remove()">Cancelar</button>
    </div>
</form>
