{% if statuses %}
<div style="overflow-x: auto;">
    <table style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
            <tr style="border-bottom: 1px solid var(--border-color); color: var(--text-muted); font-size: 0.875rem;">
                <th style="padding: 1rem 0.5rem; font-weight: 500; width: 60px;">ID</th>
                <th style="padding: 1rem 0.5rem; font-weight: 500; width: 50px;">Cor</th>
                <th style="padding: 1rem 0.5rem; font-weight: 500;">Nome</th>
                <th style="padding: 1rem 0.5rem; font-weight: 500; text-align: right;">Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for st in statuses %}
            <tr style="border-bottom: 1px solid var(--border-color-strong); transition: var(--transition);">
                <td style="padding: 1rem 0.5rem; font-weight: 600; color: var(--text-muted);">#{{ st.id }}</td>
                <td style="padding: 1rem 0.5rem;">
                    <div style="width: 24px; height: 24px; border-radius: 4px; background-color: {{ st.cor }}; border: 1px solid rgba(0,0,0,0.1);"></div>
                </td>
                <td style="padding: 1rem 0.5rem; color: var(--text-main); font-weight: 500;">{{ st.nome }}</td>
                <td style="padding: 1rem 0.5rem; text-align: right; display: flex; justify-content: flex-end; gap: 0.5rem;">
                    <button class="btn btn-ghost" style="padding:0.25rem" hx-get="/htmx/status-chamado/{{ st.id }}/form-edit" hx-target="#status-form-container" hx-swap="outerHTML">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                    </button>
                    <button class="btn btn-ghost" style="padding:0.25rem; color: var(--status-done-text);" hx-delete="/htmx/status-chamado/{{ st.id }}" hx-target="#status-list" hx-confirm="Excluir este status?">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="empty-state" style="padding: 2rem 1rem;">
    Nenhum status cadastrado.
</div>
{% endif %}
