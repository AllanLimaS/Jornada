<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default("Jornada") }}</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Frontend Assets -->
    <link rel="stylesheet" href="/static/css/style.css?v=5">
    <link rel="stylesheet" href="/static/css/timeline.css">
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    
    <!-- Flatpickr (Calendário Visual) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" id="flatpickr-light-theme" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/light.css">
    <link rel="stylesheet" id="flatpickr-dark-theme" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css" disabled>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/pt.js"></script>
    
    <!-- Vditor (Typora/Notion Style Markdown Editor) -->
    <link rel="stylesheet" href="https://unpkg.com/vditor/dist/index.css" />
    <script src="https://unpkg.com/vditor/dist/index.min.js"></script>

    <!-- Lógica UI Simples -->
    <script src="/static/js/main.js"></script>
</head>
<body hx-headers='{"Accept": "text/html"}' hx-boost="true">
    
    <div class="app-container">
        
        <!-- Sidebar -->
        {% include "partials/nav.html" %}
        
        <!-- Main Content Wrapper -->
        <main class="main-wrapper">
            
            <!-- Topbar -->
            {% include "partials/topbar.html" %}
            
            <!-- Dynamic Content Area -->
            <div class="content-area" id="main-content">
                {% block content %}{% endblock %}
            </div>
            
        </main>
        
    </div>

    <!-- Modal Genérico -->
    <div class="modal-overlay" id="global-modal" onclick="if(event.target === this) this.classList.remove('active')">
        <div class="modal-dialog" id="global-modal-dialog">
            <div class="modal-header">
                <h3 class="modal-title" id="global-modal-title">Detalhes</h3>
                <button type="button" class="btn btn-ghost" onclick="document.getElementById('global-modal').classList.remove('active')">✕</button>
            </div>
            <div class="modal-body" id="global-modal-body">
                <!-- Conteúdo carregado via HTMX -->
            </div>
        </div>
    </div>


</body>
</html>
