{% extends "base.html" %}

{% block content %}
<div class="grid-2-cols">
    
    <!-- Esquerda: Dashboard (Expediente e Ações) -->
    <div style="display: flex; flex-direction: column; gap: 1.5rem;">
        
        <!-- Bloco de Ação Rápida -->
        <div class="card" style="text-align: center; padding: 1.5rem;">
            <button class="btn btn-primary btn-block" 
                    hx-get="/htmx/atividades/form-new" 
                    hx-target="#global-modal-body"
                    style="height: 50px; font-size: 1.1rem; gap: 0.75rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                Nova Atividade
            </button>
        </div>

        <!-- Bloco de Expediente -->
        <div id="expediente-container" hx-get="/htmx/expediente" hx-trigger="load">
            <div class="card">
                <p class="text-muted text-center">Carregando horários...</p>
            </div>
        </div>

    </div>

    <!-- Direita: Timeline do Dia -->
    <div>
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-semibold">Linha do Tempo</h2>
            <div class="badge badge-outline text-sm">Resumo do dia: <span id="total-horas-dia" class="font-semibold" style="margin-left: 4px;">0h 0m</span></div>
        </div>

        <!-- HTMX carrega a lista aqui ao iniciar a pagina -->
        <div id="timeline-list" hx-get="/htmx/atividades/timeline" hx-trigger="load">
            <div class="empty-state">
                Carregando atividades...
            </div>
        </div>
    </div>

</div>
{% endblock %}
