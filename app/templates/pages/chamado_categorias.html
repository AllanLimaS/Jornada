{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-semibold">Gerenciar Categorias de Chamado</h2>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Formulario para Nova/Editar Categoria -->
    {% include "partials/categoria_form.html" %}

    <!-- Tabela de Categorias -->
    <div class="card">
        <div class="card-header">
            <h3 class="card-title mb-4">Categorias Cadastradas</h3>
        </div>
        
        <div id="categorias-list" hx-get="/htmx/categorias-chamado/list" hx-trigger="load">
            <div class="empty-state">Carregando categorias...</div>
        </div>
    </div>
</div>
{% endblock %}
