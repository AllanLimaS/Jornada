{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <div style="display: flex; align-items: center; gap: 1rem;">
        <h2 class="text-xl font-semibold">Gestão de Chamados</h2>
        <div class="htmx-indicator" style="color: var(--accent-color); font-size: 0.8rem; font-weight: 500;">
            <div style="display: flex; align-items: center; gap: 0.25rem;">
                <svg class="spinner" width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="currentColor"><style>.spinner{transform-origin:center;animation:spinner_rotate 2s linear infinite}@keyframes spinner_rotate{100%{transform:rotate(360deg)}}</style><path d="M12,1A11,11,0,1,0,23,12,11,11,0,0,0,12,1Zm0,19a8,8,0,1,1,8-8A8,8,0,0,1,12,20Z" opacity=".25"/><path d="M10.14,1.16a11,11,0,0,0-9,8.92A1.59,1.59,0,0,0,2.46,12,1.52,1.52,0,0,0,4.11,10.7a8,8,0,0,1,6.66-6.61A1.42,1.42,0,0,0,12,2.69h0A1.57,1.57,0,0,0,10.14,1.16Z"/></svg>
                <span>Processando...</span>
            </div>
        </div>
    </div>
    <button class="btn btn-primary" 
            hx-get="/htmx/chamados/form-new" 
            hx-target="#new-chamado-content" 
            onclick="document.getElementById('new-chamado-modal').classList.add('active')">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:0.25rem"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Novo Chamado
    </button>
</div>

<!-- Modal de Adição (Unificado via htmx) -->
<div id="new-chamado-modal" class="modal-overlay">
    <div class="modal-dialog modal-lg" id="new-chamado-content">
        <!-- Conteúdo carregado via HTMX (/htmx/chamados/form-new) -->
        <div class="empty-state">Carregando formulário...</div>
    </div>
</div>

<!-- Modal de Edição/Detalhes (Unificado via htmx) -->
<div id="edit-chamado-modal" class="modal-overlay">
    <div class="modal-dialog modal-lg" id="edit-chamado-content">
        <!-- Conteúdo carregado via HTMX (/htmx/chamados/{id}/modal) -->
        <div class="empty-state">Carregando detalhes...</div>
    </div>
</div>

<!-- Filtros -->
<div class="filters-container mb-6" 
     hx-get="/htmx/chamados/search" 
     hx-target="#chamados-list" 
     hx-include="[name='q'], [name='categoria_id'], [name='status_id']"
     hx-trigger="change from:select, keyup changed delay:500ms from:input"
     hx-indicator=".htmx-indicator">
    
    <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 1rem; align-items: end;">
        <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Busca</label>
            <input class="form-control" type="search" name="q" placeholder="Buscar por número ou título..." autocomplete="off">
        </div>
        
        <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Categoria</label>
            <select class="form-control" name="categoria_id">
                <option value="">Todas Categorias</option>
                {% for cat in categorias %}
                <option value="{{ cat.id }}">{{ cat.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Status</label>
            <select class="form-control" name="status_id">
                <option value="">Todos Status</option>
                {% for st in statuses %}
                <option value="{{ st.id }}">{{ st.nome }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
</div>

<!-- Listagem Central -->
<div class="card mt-4">
    <div id="chamados-list" hx-get="/htmx/chamados/list" hx-trigger="load">
        <div class="empty-state">Carregando lista de chamados...</div>
    </div>
</div>
{% endblock %}
