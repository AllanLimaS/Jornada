{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-semibold">Gerenciar Status de Chamado</h2>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Formulario para Novo/Editar Status -->
    {% include "partials/status_form.html" %}

    <!-- Tabela de Status -->
    <div class="card">
        <div class="card-header">
            <h3 class="card-title mb-4">Status Cadastrados</h3>
        </div>
        
        <div id="status-list-container" hx-get="/htmx/status-chamado/list" hx-trigger="load">
            <div class="empty-state">Carregando status...</div>
        </div>
    </div>
</div>
{% endblock %}
