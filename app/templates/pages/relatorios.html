{% extends "base.html" %}

{% block content %}
<div class="mb-6">
    <h2 class="text-xl font-semibold">Relatórios</h2>
    <p class="text-sm text-muted mt-2">Visão geral do tempo registrado na aplicação de forma local.</p>
</div>

<div class="grid-2-cols" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));">
    
    <div class="card flex items-center justify-between">
        <div>
            <h3 class="text-sm font-medium text-muted">Total Hoje</h3>
            <div class="text-2xl font-semibold mt-1">Carregando...</div>
        </div>
        <div style="color: var(--accent-color)">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
    </div>

    <div class="card flex items-center justify-between">
        <div>
            <h3 class="text-sm font-medium text-muted">Total da Semana</h3>
            <div class="text-2xl font-semibold mt-1">Carregando...</div>
        </div>
        <div style="color: var(--text-muted)">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>
        </div>
    </div>

</div>

<div class="card mt-6">
    <h3 class="card-title">Resumo por Categoria</h3>
    <div class="empty-state">
        Módulo de relatórios detalhados em desenvolvimento.
    </div>
</div>
{% endblock %}
